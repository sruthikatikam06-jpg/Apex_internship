<!DOCTYPE html>
<html>
<head>
<title>My Mini Website</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    margin:0;
    padding:0;
    text-align:center;
}

header{
    background-color:#333;
    color:white;
    padding:20px;
}

.container{
    margin-top:40px;
}

.card{
    background:white;
    width:300px;
    margin:auto;
    padding:20px;
    border-radius:10px;
    box-shadow:0px 5px 15px rgba(0,0,0,0.2);
}

.card img{
    width:100%;
    border-radius:10px;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    background:#4facfe;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0077ff;
}
</style>

<script>
function showMessage(){
    alert("Thanks for visiting my mini website!");
}
</script>

</head>
